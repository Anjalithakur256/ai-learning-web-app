<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI Learning Guide is a structured web platform to learn Artificial Intelligence step-by-step with quizzes, progress tracking, and AI-powered assistance using Gemini API." />
    <title>AI Learning Guide | Login</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=6" />
    <style>
      *,
      *:after,
      *:before {
        box-sizing: border-box;
      }

      :root {
        --cord: hsl(210, 0%, calc((40 + (var(--on, 0) * 50)) * 1%));
        --opening: hsl(
          50,
          calc((10 + (var(--on, 0) * 80)) * 1%),
          calc((20 + (var(--on, 0) * 70)) * 1%)
        );
        --feature: #0a0a0a;
        --accent: 210;
        --tongue: #e06952;
        --base-top: hsl(
          var(--accent),
          0%,
          calc((40 + (var(--on, 0) * 40)) * 1%)
        );
        --base-side: hsl(
          var(--accent),
          0%,
          calc((20 + (var(--on, 0) * 40)) * 1%)
        );
        --post: hsl(
          var(--accent),
          0%,
          calc((20 + (var(--on, 0) * 40)) * 1%)
        );
        --b-1: hsla(
          45,
          calc((0 + (var(--on, 0) * 0)) * 1%),
          calc((50 + (var(--on, 0) * 50)) * 1%),
          0.85
        );
        --b-2: hsla(
          45,
          calc((0 + (var(--on, 0) * 0)) * 1%),
          calc((20 + (var(--on, 0) * 30)) * 1%),
          0.25
        );
        --b-3: hsla(
          45,
          calc((0 + (var(--on, 0) * 0)) * 1%),
          calc((20 + (var(--on, 0) * 30)) * 1%),
          0.5
        );
        --b-4: hsla(
          45,
          calc((0 + (var(--on, 0) * 0)) * 1%),
          calc((20 + (var(--on, 0) * 30)) * 1%),
          0.25
        );
        --l-1: hsla(
          45,
          calc((0 + (var(--on, 0) * 20)) * 1%),
          calc((50 + (var(--on, 0) * 50)) * 1%),
          0.85
        );
        --l-2: hsla(
          45,
          calc((0 + (var(--on, 0) * 20)) * 1%),
          calc((50 + (var(--on, 0) * 50)) * 1%),
          0.85
        );
        --shade-hue: 320;
        --t-1: hsl(
          var(--shade-hue),
          calc((0 + (var(--on, 0) * 20)) * 1%),
          calc((30 + (var(--on, 0) * 60)) * 1%)
        );
        --t-2: hsl(
          var(--shade-hue),
          calc((0 + (var(--on, 0) * 20)) * 1%),
          calc((20 + (var(--on, 0) * 35)) * 1%)
        );
        --t-3: hsl(
          var(--shade-hue),
          calc((0 + (var(--on, 0) * 20)) * 1%),
          calc((10 + (var(--on, 0) * 20)) * 1%)
        );
        --glow-color: hsl(320, 40%, 45%);
        --glow-color-dark: hsl(320, 40%, 35%);
      }

      .lamp-page {
        min-height: calc(100vh - 160px);
        display: grid;
        place-items: center;
        padding: 2rem 5vw 4rem;
      }

      .lamp-stage {
        width: min(500px, 100%);
        background: #121921;
        border-radius: 28px;
        padding: 2.5rem 2rem;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
      }

      .container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8vmin;
        flex-wrap: wrap;
        padding: 1rem 0;
      }

      .login-form {
        background: rgba(18, 25, 33, 0.9);
        padding: 3rem 2.5rem;
        border-radius: 20px;
        min-width: 320px;
        width: 100%;
        opacity: 1;
        transform: scale(1) translateY(0);
        pointer-events: all;
        border-color: var(--glow-color);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.1),
          0 0 30px var(--glow-color),
          inset 0 0 15px rgba(255, 255, 255, 0.05);
      }

      .login-form h2 {
        color: #fff;
        font-size: 2rem;
        margin: 0 0 2rem 0;
        text-align: center;
        text-shadow: 0 0 8px var(--glow-color);
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        color: #aaa;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
        text-shadow: 0 0 5px var(--glow-color);
      }

      .form-group input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--glow-color);
        box-shadow: 0 0 10px var(--glow-color);
        background: rgba(255, 255, 255, 0.08);
      }

      .form-group input::placeholder {
        color: #666;
      }

      .login-btn {
        width: 100%;
        padding: 0.875rem;
        background: linear-gradient(
          135deg,
          var(--glow-color),
          var(--glow-color-dark)
        );
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        margin-top: 0.5rem;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3),
          0 0 20px var(--glow-color);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .form-footer {
        margin-top: 1.5rem;
        text-align: center;
      }

      .forgot-link {
        color: #888;
        font-size: 0.9rem;
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .forgot-link:hover {
        color: var(--glow-color);
        text-shadow: 0 0 10px var(--glow-color);
      }

      .auth-tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .tab {
        flex: 1;
        padding: 0.75rem;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #888;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .tab.active {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--glow-color);
        color: #fff;
        text-shadow: 0 0 5px var(--glow-color);
      }

      .tab:hover:not(.active) {
        background: rgba(255, 255, 255, 0.08);
      }

      .hidden {
        display: none !important;
      }

      .auth-message {
        margin-bottom: 1rem;
        padding: 0.75rem;
        border-radius: 8px;
        font-size: 0.9rem;
        text-align: center;
        color: #fff;
        background: rgba(255, 255, 255, 0.05);
        min-height: 1.5rem;
      }

      .auth-message:empty {
        display: none;
      }

      .auth-message.success {
        background: rgba(52, 168, 83, 0.2);
        border: 1px solid #34a853;
        color: #34a853;
      }

      .auth-message.error {
        background: rgba(234, 67, 53, 0.2);
        border: 1px solid #ea4335;
        color: #ea4335;
      }

      /* Form animations */
      form {
        animation: fadeSlideIn 0.4s ease;
      }

      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Password toggle */
      .password-wrapper {
        position: relative;
      }

      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        padding: 4px;
        transition: color 0.3s ease;
      }

      .password-toggle:hover {
        color: var(--glow-color);
      }

      .password-wrapper input {
        padding-right: 40px;
      }

      /* Loading state */
      .login-btn.loading {
        pointer-events: none;
        opacity: 0.7;
      }

      .login-btn.loading::after {
        content: '';
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid transparent;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Password strength indicator */
      .password-strength {
        height: 4px;
        border-radius: 2px;
        margin-top: 8px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .password-strength-bar {
        height: 100%;
        width: 0;
        transition: width 0.3s ease, background 0.3s ease;
        border-radius: 2px;
      }

      .password-strength-bar.weak { width: 33%; background: #ea4335; }
      .password-strength-bar.medium { width: 66%; background: #fbbc05; }
      .password-strength-bar.strong { width: 100%; background: #34a853; }

      .password-hint {
        font-size: 0.75rem;
        color: #666;
        margin-top: 4px;
      }

      .divider {
        display: flex;
        align-items: center;
        margin: 1.5rem 0;
        color: #666;
        font-size: 0.85rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }

      .divider span {
        padding: 0 1rem;
      }

      .google-btn {
        width: 100%;
        padding: 0.875rem;
        background: #fff;
        border: none;
        border-radius: 10px;
        color: #333;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }

      .google-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
      }

      .google-btn.loading {
        pointer-events: none;
        opacity: 0.7;
      }

      .google-btn svg {
        width: 20px;
        height: 20px;
      }

      /* Role selection styles */
      .role-selection {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        padding: 0.5rem;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .role-option {
        flex: 1;
        position: relative;
      }

      .role-option input[type="radio"] {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .role-option label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        padding: 1rem 0.75rem;
        background: rgba(255, 255, 255, 0.04);
        border: 2px solid transparent;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
      }

      .role-option input[type="radio"]:checked + label {
        background: rgba(71, 165, 116, 0.15);
        border-color: var(--glow-color);
        box-shadow: 0 0 15px rgba(71, 165, 116, 0.3);
      }

      .role-option label:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-2px);
      }

      .role-icon {
        font-size: 2rem;
        margin-bottom: 0.25rem;
      }

      .role-title {
        font-size: 0.95rem;
        font-weight: 600;
        color: #fff;
      }

      .role-desc {
        font-size: 0.75rem;
        color: #888;
        line-height: 1.3;
      }

      .form-section-title {
        font-size: 0.85rem;
        color: #888;
        margin-bottom: 0.75rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }


      @media (max-width: 900px) {
        .lamp-page {
          min-height: auto;
          padding: 2rem 4vw 3rem;
        }

        .lamp-stage {
          padding: 2rem 1.5rem;
          width: min(450px, 100%);
        }

        .container {
          gap: 6vmin;
        }

        .login-form {
          min-width: 0;
          width: 100%;
        }
      }

      @media (max-width: 600px) {
        .lamp-stage {
          padding: 1.5rem 1.2rem;
        }

        .login-form {
          padding: 2rem 1.5rem;
        }

        .login-form h2 {
          font-size: 1.6rem;
        }

        .container {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="index.html">AI Learning Guide</a>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>        <a href="teacher-dashboard.html" class="teacher-only" style="display: none;">Teacher Dashboard</a>        <a href="quiz.html">Quiz</a>
        <a href="chat.html">Chat</a>
        <a href="profile.html">Profile</a>
        <a href="about.html">About</a>
        <a href="login.html" class="button ghost active">Login</a>
      </nav>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        ☰
      </button>
    </header>

    <main class="lamp-page">
      <div class="lamp-stage">
        <div class="container">


          <div class="login-form">
            <h2>Welcome</h2>
            
            <div class="auth-tabs">
              <button class="tab active" data-tab="login">Login</button>
              <button class="tab" data-tab="signup">Sign Up</button>
            </div>

            <p id="authMessage" class="auth-message"></p>

            <!-- Login Form -->
            <form id="loginForm">
              <div class="form-group">
                <label for="email">Email Address</label>
                <input
                  type="email"
                  name="email"
                  id="loginEmail"
                  placeholder="Enter your email"
                  required
                />
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                  <input
                    type="password"
                    name="password"
                    id="loginPassword"
                    placeholder="Enter your password"
                    required
                  />
                  <button type="button" class="password-toggle" data-target="loginPassword">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </div>
              </div>
              <button type="submit" class="login-btn">Login</button>
              <div class="form-footer">
                <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot Password?</a>
              </div>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="hidden">
              <div class="form-section-title">Select Your Role</div>
              <div class="role-selection">
                <div class="role-option">
                  <input type="radio" id="roleStudent" name="role" value="student" checked>
                  <label for="roleStudent">
                    <div class="role-icon">🎓</div>
                    <div class="role-title">Student</div>
                    <div class="role-desc">Access learning materials and quizzes</div>
                  </label>
                </div>
                <div class="role-option">
                  <input type="radio" id="roleTeacher" name="role" value="teacher">
                  <label for="roleTeacher">
                    <div class="role-icon">👨‍🏫</div>
                    <div class="role-title">Teacher</div>
                    <div class="role-desc">Manage content and view analytics</div>
                  </label>
                </div>
              </div>
              <div class="form-group">
                <label for="name">Full Name</label>
                <input
                  type="text"
                  name="name"
                  id="signupName"
                  placeholder="Enter your full name"
                  required
                />
              </div>
              <div class="form-group">
                <label for="email">Email Address</label>
                <input
                  type="email"
                  name="email"
                  id="signupEmail"
                  placeholder="Enter your email"
                  required
                />
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                  <input
                    type="password"
                    name="password"
                    id="signupPassword"
                    placeholder="Create a password"
                    minlength="6"
                    required
                  />
                  <button type="button" class="password-toggle" data-target="signupPassword">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </div>
                <div class="password-strength">
                  <div class="password-strength-bar" id="passwordStrengthBar"></div>
                </div>
                <p class="password-hint">Min 6 characters with letters and numbers</p>
              </div>
              <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                  <input
                    type="password"
                    name="confirmPassword"
                    id="confirmPassword"
                    placeholder="Confirm your password"
                    minlength="6"
                    required
                  />
                  <button type="button" class="password-toggle" data-target="confirmPassword">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </div>
              </div>
              <button type="submit" class="login-btn">Create Account</button>
              <p class="form-footer" style="font-size: 0.8rem; color: #888;">By signing up, you agree to our <a href="privacy.html" style="color: var(--glow-color);">Privacy Policy</a></p>
            </form>

            <div class="divider"><span>or</span></div>

            <button id="googleSignIn" class="google-btn">
              <svg viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Continue with Google
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p>Secure login with Firebase Auth.</p>
    </footer>

    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
    <script>
      // Make login form active by default (no lamp interaction needed)
      const LOGIN_FORM = document.querySelector(".login-form");
      if (LOGIN_FORM) {
        LOGIN_FORM.classList.add("active");
      }
    </script>
  </body>
</html>
